name: Build and Package

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-2025

    strategy:
      matrix:
        platform: [x64, ARM64]

    env:
      PLATFORM: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # ── Extract version from Directory.Build.props ─────────────
      - name: Read version
        id: version
        shell: pwsh
        run: |
          [xml]$props = Get-Content Directory.Build.props
          $ver = $props.Project.PropertyGroup[0].Version
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT
          echo "VERSION_QUAD=$ver.0" >> $env:GITHUB_OUTPUT
          Write-Host "Detected version: $ver"

      # ── Stamp MSIX manifest ────────────────────────────────────
      - name: Stamp AppxManifest version
        shell: pwsh
        run: |
          $manifest = "LittleLauncherMSIX/Package.appxmanifest"
          $quad = "${{ steps.version.outputs.VERSION_QUAD }}"
          # Only replace Version= on the Identity element line
          (Get-Content $manifest) | ForEach-Object {
            if ($_ -match '<Identity') { $_ -replace 'Version="[^"]*"', "Version=`"$quad`"" } else { $_ }
          } | Set-Content $manifest

      # ── Regular build ──────────────────────────────────────────
      - name: Build (dotnet)
        run: dotnet build LittleLauncher/LittleLauncher.csproj -c Release -p:Platform=$env:PLATFORM

      # ── Authenticode signing ────────────────────────────────────
      # Requires two GitHub repository secrets:
      #   CODESIGN_PFX_BASE64  — base64-encoded PFX certificate file
      #   CODESIGN_PFX_PASSWORD — password for the PFX certificate
      #
      # To encode your PFX: [Convert]::ToBase64String([IO.File]::ReadAllBytes("cert.pfx"))
      # Obtain a certificate from DigiCert, Sectigo, or another trusted CA.
      # EV certificates grant instant reputation with Smart App Control; OV certificates
      # build reputation over time. Self-signed certificates do NOT satisfy SAC.
      - name: Sign executables
        shell: pwsh
        env:
          CODESIGN_PFX_BASE64: ${{ secrets.CODESIGN_PFX_BASE64 }}
          CODESIGN_PFX_PASSWORD: ${{ secrets.CODESIGN_PFX_PASSWORD }}
        run: |
          if ([string]::IsNullOrEmpty($env:CODESIGN_PFX_BASE64)) {
            Write-Host "CODESIGN_PFX_BASE64 secret not set — skipping Authenticode signing." -ForegroundColor Yellow
            Write-Host "Smart App Control may block unsigned binaries. See README for setup instructions."
            exit 0
          }

          $pfxPath = Join-Path $env:RUNNER_TEMP "codesign.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:CODESIGN_PFX_BASE64))

          $binDir = "LittleLauncher\bin\$env:PLATFORM\Release\net10.0-windows10.0.22000.0"
          $exes = @(
            "$binDir\LittleLauncher.exe",
            "$binDir\LittleLauncherFlyout.exe"
          ) | Where-Object { Test-Path $_ }

          foreach ($exe in $exes) {
            Write-Host "Signing $exe ..."
            & signtool sign /fd SHA256 /f $pfxPath /p $env:CODESIGN_PFX_PASSWORD `
              /tr http://timestamp.digicert.com /td SHA256 $exe
            if ($LASTEXITCODE -ne 0) { Write-Error "signtool failed for $exe"; exit 1 }
          }

          Remove-Item $pfxPath -Force

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: Build-${{ matrix.platform }}
          path: LittleLauncher/bin/${{ matrix.platform }}/Release/net10.0-windows10.0.22000.0/

      # ── MSI build (WiX) ─────────────────────────────────────────
      - name: Build MSI installer
        run: |
          dotnet build LittleLauncherSetup\LittleLauncherSetup.wixproj `
            -p:Platform=$env:PLATFORM `
            -p:Configuration=Release `
            "-p:BuildOutputPath=$env:GITHUB_WORKSPACE\LittleLauncher\bin\$env:PLATFORM\Release\net10.0-windows10.0.22000.0" `
            "-p:Version=${{ steps.version.outputs.VERSION }}"

      # ── Sign MSI ────────────────────────────────────────────────
      - name: Sign MSI
        shell: pwsh
        env:
          CODESIGN_PFX_BASE64: ${{ secrets.CODESIGN_PFX_BASE64 }}
          CODESIGN_PFX_PASSWORD: ${{ secrets.CODESIGN_PFX_PASSWORD }}
        run: |
          if ([string]::IsNullOrEmpty($env:CODESIGN_PFX_BASE64)) {
            Write-Host "CODESIGN_PFX_BASE64 secret not set — skipping MSI signing." -ForegroundColor Yellow
            exit 0
          }

          $pfxPath = Join-Path $env:RUNNER_TEMP "codesign.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:CODESIGN_PFX_BASE64))

          $msi = "LittleLauncherSetup\bin\$env:PLATFORM\Release\LittleLauncherSetup.msi"
          Write-Host "Signing $msi ..."
          & signtool sign /fd SHA256 /f $pfxPath /p $env:CODESIGN_PFX_PASSWORD `
            /tr http://timestamp.digicert.com /td SHA256 $msi
          if ($LASTEXITCODE -ne 0) { Write-Error "signtool failed for MSI"; exit 1 }

          Remove-Item $pfxPath -Force

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: MSI-${{ matrix.platform }}
          path: LittleLauncherSetup/bin/${{ matrix.platform }}/Release/LittleLauncherSetup.msi

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout (for git log)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes from commits
        id: notes
        run: |
          CURRENT_TAG="${GITHUB_REF#refs/tags/}"
          PREVIOUS_TAG=$(git tag --sort=-v:refname | grep -E '^v' | sed -n '2p')

          if [ -n "$PREVIOUS_TAG" ]; then
            RANGE="${PREVIOUS_TAG}..${CURRENT_TAG}"
          else
            RANGE="${CURRENT_TAG}"
          fi

          BODY=$(git log "$RANGE" --pretty=format:"- %s" --no-merges \
            | grep -vi "^- Bump version" \
            | grep -vi "^- Merge branch")

          if [ -z "$BODY" ]; then
            BODY="- Maintenance release (no notable changes)"
          fi

          {
            echo "RELEASE_BODY<<RELEASE_EOF"
            echo "## What's Changed"
            echo ""
            echo "$BODY"
            echo "RELEASE_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Download portable build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: Build-*
          path: artifacts/build

      - name: Download MSI artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: MSI-*
          path: artifacts/msi

      - name: Collect release files
        run: |
          mkdir -p release
          for dir in artifacts/msi/*/; do
            arch=$(basename "$dir" | sed 's/MSI-//')
            cp "$dir"/*.msi "release/LittleLauncher-${arch}-Setup.msi"
          done
          for dir in artifacts/build/*/; do
            arch=$(basename "$dir" | sed 's/Build-//')
            (cd "$dir" && zip -r "../../../release/LittleLauncher-${arch}-portable.zip" .)
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          body: ${{ steps.notes.outputs.RELEASE_BODY }}
          generate_release_notes: true
